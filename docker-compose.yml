version: '3.8'

services:
  fastapi:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - storage
      - redis
    networks:
      - video-network

  # 🎧 오디오 전담 워커
  audio_worker:
    build: .
    command: celery -A worker.celery_app worker -Q audio_queue --loglevel=info
    depends_on:
      - storage
      - redis
    networks:
      - video-network

  # 🎬 비디오 전담 워커
  video_worker:
    build: .
    command: celery -A worker.celery_app worker -Q video_queue --loglevel=info --concurrency=2
    depends_on:
      - storage
      - redis
    networks:
      - video-network

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    networks:
      - video-network

  storage:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - video-network

networks:
  video-network:
    driver: bridge

volumes:
  minio_data: